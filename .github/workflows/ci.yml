name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  nginx-config:
    name: Validate prod nginx config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Lint frontend/nginx.conf with `nginx -t`, mounted exactly where the
      # prod image puts it (Dockerfile.prod: COPY nginx.conf
      # /etc/nginx/conf.d/default.conf), using the same nginx image tag — so a
      # syntax error in the prod reverse-proxy config fails the PR instead of
      # only surfacing at deploy time.
      - name: nginx -t (same image as the prod frontend)
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE/frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro" \
            nginx:1.27-alpine nginx -t

  compose-config:
    name: Validate prod compose config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Resolve docker-compose.prod.yml end-to-end (interpolation, anchors, and
      # the required ${VAR:?} secrets). Dummy values satisfy the required vars,
      # so a YAML error, a broken anchor reference, or a missing-variable
      # reference fails the PR instead of only surfacing at `docker compose up`.
      # (Note: this validates structure, not semantics — a valid-but-wrong
      # value still passes.)
      - name: docker compose config
        env:
          POSTGRES_PASSWORD: ci-dummy-password
          JWT_SECRET_KEY: ci-dummy-secret-key
          ALLOWED_EMAIL_DOMAINS: example.com
          INITIAL_ADMIN_ENTERPRISE_EMAIL: admin@example.com
        run: docker compose -f docker-compose.prod.yml config --quiet
