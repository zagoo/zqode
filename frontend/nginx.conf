# Serves the built SPA and reverse-proxies the API to the backend container.
# The SPA calls the API with relative paths (/api/v1/...), so the API must be
# same-origin in production — this proxy is what makes that work (it replaces
# Vite's dev-server proxy).
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Vite emits content-hashed files under /assets — cache them hard.
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Reverse-proxy API calls to the backend service on the compose network.
    # Resolve "backend" at request time via Docker's embedded DNS so a backend
    # restart (new container IP) doesn't leave nginx pinned to a stale address.
    location /api/ {
        resolver 127.0.0.11 valid=30s;
        set $upstream http://backend:8000;
        proxy_pass $upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # LLM gateway calls can be slow; don't cut long upstream responses.
        proxy_read_timeout 120s;
    }

    # Interactive API docs + schema, proxied to the backend. FastAPI serves
    # these at the root (not under /api), so without this they'd hit the SPA
    # fallback below and return index.html. Publicly reachable in prod by
    # decision — anyone who can reach the site can view the API surface.
    location ~ ^/(docs|redoc|openapi\.json)($|/) {
        resolver 127.0.0.11 valid=30s;
        set $upstream http://backend:8000;
        proxy_pass $upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA history-mode fallback: unknown paths return index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
